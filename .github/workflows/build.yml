name: Build & Release

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AXIOM_JAR: Axiom-5.3.0-for-MC1.21.10.jar
  AXIOM_URL: https://github.com/MaxLananas/railway-tools-addons-axiom/releases/download/deps/Axiom-5.3.0-for-MC1.21.10.jar

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Download Axiom dependency
        run: |
          mkdir -p libs
          echo "Downloading Axiom jar..."
          curl -L \
            --retry 3 \
            --retry-delay 5 \
            --fail \
            -o "libs/${{ env.AXIOM_JAR }}" \
            "${{ env.AXIOM_URL }}"
          echo "Downloaded $(du -sh libs/${{ env.AXIOM_JAR }} | cut -f1)"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-disabled: true

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build
        run: |
          ./gradlew build \
            --no-build-cache \
            --no-daemon \
            --parallel \
            --warning-mode all \
            --stacktrace
        env:
          GRADLE_OPTS: >-
            -Dorg.gradle.daemon=false
            -Xmx2G
            -Xms512m

      - name: Get mod version
        id: version
        run: |
          VERSION=$(grep "^mod_version" gradle.properties | cut -d'=' -f2 | tr -d ' \r\n')
          MC_VERSION=$(grep "^minecraft_version" gradle.properties | cut -d'=' -f2 | tr -d ' \r\n')
          echo "version=${VERSION}"           >> "$GITHUB_OUTPUT"
          echo "mc_version=${MC_VERSION}"     >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}-mc${MC_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rail-path-tool-${{ steps.version.outputs.tag }}
          path: |
            build/libs/*.jar
            !build/libs/*-dev.jar
            !build/libs/*-sources.jar
          if-no-files-found: error

      - name: Check if tag exists
        id: tag_check
        if: >
          github.event_name == 'push' &&
          (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "$TAG"; then
            echo "exists=true"  >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        if: >
          github.event_name == 'push' &&
          (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
          steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "BTE Rail Path Tool ${{ steps.version.outputs.version }} — MC ${{ steps.version.outputs.mc_version }}"
          body: |
            ## 🚂 BTE Rail Path Tool `${{ steps.version.outputs.version }}`

            **Minecraft** : `${{ steps.version.outputs.mc_version }}`
            **Requires** : [Axiom](https://modrinth.com/mod/axiom)

            ### 📦 Installation
            Place le fichier `.jar` dans ton dossier `mods/`.
            > ⚠️ Ne pas utiliser le fichier `-sources.jar`.

            ---
            *Build automatique — GitHub Actions*
          files: |
            build/libs/*.jar
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
